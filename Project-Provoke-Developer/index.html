<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Video Player</title>
    <link rel="stylesheet" href="web.css">
</head>
<body>
    <div class="video-container">
        <label for="videoIdInput">Enter YouTube Video ID:</label>
        <input type="text" id="videoIdInput" placeholder="Enter video ID..." value="Y62MJny9LHg">
        <button onclick="loadVideo()">Load Video</button>
        <div id="videoPlayer"></div>
    </div>
    <script>
      function loadVideo() {
    const videoId = document.getElementById('videoIdInput').value;

   
    const videoUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1`;

    const iframe = document.createElement('iframe');

    
    iframe.src = videoUrl;
    iframe.width = '200';
    iframe.height = '100';
    iframe.frameBorder = '0';
    iframe.allowFullscreen = true;

  
    const videoPlayerContainer = document.getElementById('videoPlayer');
    videoPlayerContainer.innerHTML = ''; // Clear previous content
    videoPlayerContainer.appendChild(iframe);
}

    </script>
</body>
</html>
